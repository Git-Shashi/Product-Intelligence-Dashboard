services:
  - type: web
    name: product-intelligence-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: product-intelligence-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://product-intelligence-dashboard.vercel.app
      - key: EXTRACTION_PROVIDER
        value: ocr

databases:
  - name: product-intelligence-db
    databaseName: product_dashboard
    plan: free
